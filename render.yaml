services:
  # 合并后的唯一付费服务：Tidal 中继（对外，服务手机 App/PWA）+ cyberboss 大脑（微信 + Tidal）
  # 同一容器双进程，共享 /data 持久盘（账号状态、Claude 登录、聊天库、上传文件）
  - type: web
    name: hearttide-brain
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: CYBERBOSS_USER_NAME
        value: 灵兮
      - key: CYBERBOSS_USER_GENDER
        value: female
      - key: CYBERBOSS_ACCOUNT_ID
        sync: false          # 从旧 cyberboss 服务里抄过来
      - key: CYBERBOSS_WORKSPACE_ROOT
        value: /app/cyberboss-workspace-main
      - key: CYBERBOSS_RUNTIME
        value: claudecode
      - key: CYBERBOSS_CLAUDE_COMMAND
        value: claude
      - key: CYBERBOSS_CLAUDE_PERMISSION_MODE
        value: bypassPermissions   # 灵兮授权：工具调用自动放行，存记忆时口头提一句即可
      - key: IS_SANDBOX
        value: "1"                 # 容器内以 root 跑 claude，bypass 模式需要此放行
      - key: CYBERBOSS_CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: CYBERBOSS_CLAUDE_CONTEXT_WINDOW
        value: "200000"
      - key: CYBERBOSS_CLAUDE_EXTRA_ARGS
        value: --effort,medium
      # ---- Tidal 中继（同容器） ----
      - key: RELAY_SECRET
        sync: false          # 沿用原 tidal-echo-backend 的 RELAY_SECRET
      - key: RELAY_AI_NAME
        value: 盛沐
      - key: RELAY_HUMAN_NAME
        value: 灵兮
      - key: RELAY_DB
        value: /data/relay/relay.db
      - key: RELAY_UPLOAD_DIR
        value: /data/relay/uploads
      - key: RELAY_BRAIN_FILE
        value: /data/relay/brain_target
      - key: RELAY_PUBLIC_PREFIX
        value: ""
      - key: RELAY_APP_PATH
        value: https://tidal-echo-web.onrender.com/
      - key: RELAY_ALLOW_ORIGINS
        value: https://tidal-echo-web.onrender.com
    disk:
      name: hearttide-data
      mountPath: /data
      sizeGB: 2
